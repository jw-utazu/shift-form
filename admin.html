<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<title>シフト管理</title>
<style>
:root {
  --primary: #2563eb; --primary-light: #dbeafe;
  --bg: #f8fafc; --card: #fff;
  --border: #e2e8f0; --text: #1e293b; --sub: #64748b;
  --green: #16a34a; --danger: #ef4444;
  --radius: 12px; --shadow: 0 2px 10px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Noto Sans JP", sans-serif; font-size: 15px; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--primary); color: #fff; padding: 14px 20px; }
.header h1 { font-size: 17px; font-weight: 700; }

.container { max-width: 680px; margin: 0 auto; padding: 24px 16px; }

.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--primary-light); }

/* 初期画面 */
#screen-top { display: block; }
#screen-form { display: none; }
#screen-done { display: none; }

.ym-text { font-size: 24px; font-weight: 700; color: var(--primary); text-align: center; padding: 8px 0 20px; }

.btn-start {
  display: block; width: 100%; padding: 16px;
  font-size: 17px; font-weight: 700; font-family: inherit;
  background: var(--primary); color: #fff;
  border: none; border-radius: 10px; cursor: pointer;
  transition: opacity .2s;
}
.btn-start:hover { opacity: .88; }

/* 紐付けテーブル */
.map-group { margin-bottom: 18px; }
.map-group-label {
  font-size: 12px; font-weight: 700; color: var(--primary);
  background: var(--primary-light); padding: 4px 10px;
  border-radius: 6px; display: inline-block; margin-bottom: 8px;
}
.map-row { display: grid; grid-template-columns: 1fr 20px 1fr; align-items: center; gap: 8px; margin-bottom: 8px; }
.map-cur { font-size: 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; }
.map-arrow { text-align: center; color: var(--sub); }
.map-select { font-size: 12px; background: #fff; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 8px; width: 100%; cursor: pointer; }
.map-select:focus { outline: none; border-color: var(--primary); }

/* シート配置 */
.sheet-list { list-style: none; margin-bottom: 4px; }
.sheet-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; margin-bottom: 6px; border: 1.5px solid var(--border); border-radius: 8px; background: #fff; font-size: 13px; }
.sheet-item.new-sheet { border-color: var(--primary); background: var(--primary-light); font-weight: 700; color: var(--primary); }
.sheet-num { font-size: 11px; color: var(--sub); width: 42px; text-align: right; }
.sheet-item.new-sheet .sheet-num { color: var(--primary); }
.sheet-name { flex: 1; }
.sheet-badge { font-size: 10px; background: var(--primary); color: #fff; padding: 1px 7px; border-radius: 10px; }
.sheet-btns { display: flex; flex-direction: column; gap: 3px; }
.sheet-btn { width: 26px; height: 22px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); cursor: pointer; font-size: 11px; }
.sheet-btn:hover { background: var(--border); }
.sheet-btn:disabled { opacity: .3; cursor: default; }
.ellipsis { text-align: center; color: var(--sub); font-size: 11px; margin: 2px 0; }

/* ボタン類 */
.btn-row { display: flex; gap: 10px; margin-top: 4px; }
.btn { padding: 11px 22px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity .15s; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; flex: 1; }
.btn-primary:hover:not(:disabled) { opacity: .88; }
.btn-ghost { background: var(--bg); color: var(--sub); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); }

/* ローディング */
.loading-row { display: flex; align-items: center; gap: 10px; color: var(--sub); font-size: 14px; padding: 8px 0; }
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* エラー */
.err { background: #fee2e2; color: var(--danger); border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-top: 12px; display: none; }
.err.show { display: block; }

/* 完了 */
.done-inner { text-align: center; padding: 20px 0; }
.done-inner .icon { font-size: 52px; margin-bottom: 12px; }
.done-inner .title { font-size: 18px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
.done-inner .sub { font-size: 14px; color: var(--sub); }
</style>
</head>
<body>

<div class="header"><h1>⚙️ シフト管理</h1></div>

<div class="container">

  <!-- 初期画面 -->
  <div id="screen-top">
    <div class="card">
      <div id="ym-loading" class="loading-row"><div class="spin"></div>読み込み中...</div>
      <div id="ym-ready" style="display:none;">
        <div class="ym-text" id="ym-text"></div>
        <button class="btn-start" onclick="goForm()">フォームを作成する</button>
      </div>
      <div class="err" id="err-top">読み込みに失敗しました。再読み込みしてください。</div>
    </div>
  </div>

  <!-- フォーム画面 -->
  <div id="screen-form">

    <!-- 紐付け -->
    <div class="card" id="card-mapping">
      <div class="card-title">① 日付の紐付け設定</div>
      <div id="mapping-rows"></div>
    </div>

    <!-- シート配置 -->
    <div class="card" id="card-placement">
      <div class="card-title">② シートの配置順</div>
      <ul class="sheet-list" id="sheet-list"></ul>
    </div>

    <!-- 実行 -->
    <div class="card">
      <div id="exec-status" style="display:none;" class="loading-row"><div class="spin"></div><span id="exec-msg">作成中...</span></div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="btn-cancel" onclick="goTop()">キャンセル</button>
        <button class="btn btn-primary" id="btn-exec" onclick="execCreate()">作成する</button>
      </div>
      <div class="err" id="err-exec"></div>
    </div>

  </div>

  <!-- 完了画面 -->
  <div id="screen-done">
    <div class="card">
      <div class="done-inner">
        <div class="icon">✅</div>
        <div class="title">作成完了</div>
        <div class="sub" id="done-sub"></div>
      </div>
      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-primary" onclick="goTop()">トップへ戻る</button>
      </div>
    </div>
  </div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx1SnmwmKJrrzcVyuJIFiZrCwmRErBKxgxKpmvPrLuKLIvTGVp9aa4p4hrrgknjpPgetw/exec';

let adminData    = null;
let mappingResult = {};
let sheetNames   = [];

// ============================================================
// 初期データ取得
// ============================================================
// GASはCORSヘッダーを返せないのでJSONPで取得
function jsonp(url, callback) {
  const cbName = '_cb_' + Date.now();
  window[cbName] = function(data) {
    delete window[cbName];
    document.head.removeChild(script);
    callback(null, data);
  };
  const script = document.createElement('script');
  script.onerror = function() { callback(new Error('failed')); };
  script.src = url + '&callback=' + cbName;
  document.head.appendChild(script);
}

jsonp(GAS_URL + '?action=adminData', function(err, d) {
  if (err) {
    document.getElementById('ym-loading').style.display = 'none';
    document.getElementById('err-top').classList.add('show');
    return;
  }
  adminData  = d;
  sheetNames = d.sheetNames || [];
  document.getElementById('ym-loading').style.display = 'none';
  document.getElementById('ym-text').textContent = d.year + '年' + d.month + '月';
  document.getElementById('ym-ready').style.display = 'block';
});

// ============================================================
// 画面切替
// ============================================================
function show(id) {
  ['screen-top','screen-form','screen-done'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function goTop() { show('screen-top'); }

function goForm() {
  buildMapping();
  buildSheetList();
  show('screen-form');
}

// ============================================================
// 紐付けUI
// ============================================================
function buildMapping() {
  const currentSlots = adminData.currentSlots || [];
  const prevSlots    = adminData.prevSlots    || [];
  const grouped      = groupSlots(currentSlots);
  const prevGrouped  = groupSlots(prevSlots);

  mappingResult = {};
  currentSlots.forEach(cs => {
    const key = cs.week + ' ' + cs.dateLabel + ' ' + cs.time;
    const matched = prevSlots.find(ps => ps.time === cs.time);
    mappingResult[key] = matched ? matched.week + ' ' + matched.dateLabel + ' ' + matched.time : '';
  });

  const container = document.getElementById('mapping-rows');
  container.innerHTML = '';

  if (prevSlots.length === 0) {
    container.innerHTML = '<div style="color:var(--sub);font-size:13px;">前月のシートが見つかりません（初回作成時は紐付け不要です）</div>';
    return;
  }

  grouped.forEach(g => {
    const gDiv = document.createElement('div');
    gDiv.className = 'map-group';
    gDiv.innerHTML = '<div class="map-group-label">' + g.week + '　' + g.dateLabel + '</div>';

    g.times.forEach(time => {
      const key = g.week + ' ' + g.dateLabel + ' ' + time;
      const defaultVal = mappingResult[key] || '';

      let options = '<option value="">（なし）</option>';
      prevGrouped.forEach(pg => {
        options += '<optgroup label="' + pg.week + '　' + pg.dateLabel + '">';
        pg.times.forEach(pt => {
          const pkey = pg.week + ' ' + pg.dateLabel + ' ' + pt;
          options += '<option value="' + pkey + '"' + (pkey === defaultVal ? ' selected' : '') + '>'
            + pg.dateLabel + '　' + pt + '</option>';
        });
        options += '</optgroup>';
      });

      const row = document.createElement('div');
      row.className = 'map-row';
      row.innerHTML =
        '<div class="map-cur">' + time + '</div>'
        + '<div class="map-arrow">→</div>'
        + '<select class="map-select" data-key="' + key + '">' + options + '</select>';
      gDiv.appendChild(row);
    });

    container.appendChild(gDiv);
  });
}

// ============================================================
// シート配置UI
// ============================================================
function buildSheetList() {
  const sheetNameB = adminData.year + '.' + String(adminData.month).padStart(2, '0') + 'シフト希望';
  const existing   = sheetNames.filter(n => n !== sheetNameB);
  const pos        = Math.min(3, existing.length + 1);
  const allNames   = existing.slice();
  allNames.splice(pos - 1, 0, sheetNameB);
  renderSheetList(allNames, sheetNameB);
}

function renderSheetList(allNames, newSheet) {
  const ul  = document.getElementById('sheet-list');
  ul._names    = allNames;
  ul._newSheet = newSheet;

  const pos  = allNames.indexOf(newSheet);
  const from = Math.max(0, pos - 2);
  const to   = Math.min(allNames.length - 1, pos + 2);

  ul.innerHTML = '';

  if (from > 0) {
    const d = document.createElement('div');
    d.className = 'ellipsis'; d.textContent = '… 上に' + from + 'シート'; ul.appendChild(d);
  }
  for (let i = from; i <= to; i++) {
    const name  = allNames[i];
    const isNew = name === newSheet;
    const li    = document.createElement('li');
    li.className = 'sheet-item' + (isNew ? ' new-sheet' : '');
    li.innerHTML =
      '<span class="sheet-num">' + (i + 1) + '番目</span>'
      + '<span class="sheet-name">' + name + '</span>'
      + (isNew ? '<span class="sheet-badge">新規</span>' : '')
      + (isNew
        ? '<div class="sheet-btns">'
          + '<button class="sheet-btn" onclick="moveSheet(-1)"' + (i === 0 ? ' disabled' : '') + '>▲</button>'
          + '<button class="sheet-btn" onclick="moveSheet(1)"' + (i === allNames.length - 1 ? ' disabled' : '') + '>▼</button>'
          + '</div>'
        : '');
    ul.appendChild(li);
  }
  if (to < allNames.length - 1) {
    const d = document.createElement('div');
    d.className = 'ellipsis'; d.textContent = '… 下に' + (allNames.length - 1 - to) + 'シート'; ul.appendChild(d);
  }
}

function moveSheet(dir) {
  const ul      = document.getElementById('sheet-list');
  const names   = ul._names;
  const newSheet = ul._newSheet;
  const idx     = names.indexOf(newSheet);
  const t       = idx + dir;
  if (t < 0 || t >= names.length) return;
  names.splice(idx, 1);
  names.splice(t, 0, newSheet);
  renderSheetList(names, newSheet);
}

// ============================================================
// 作成実行
// ============================================================
async function execCreate() {
  // 紐付け結果を収集
  document.querySelectorAll('.map-select').forEach(sel => {
    mappingResult[sel.dataset.key] = sel.value;
  });

  // シート配置
  const ul       = document.getElementById('sheet-list');
  const finalPos = ul._names.indexOf(ul._newSheet) + 1;

  // UI無効化
  document.getElementById('btn-exec').disabled   = true;
  document.getElementById('btn-cancel').disabled = true;
  document.getElementById('exec-status').style.display = 'flex';
  document.getElementById('err-exec').classList.remove('show');

  try {
    // POSTはno-corsで送信（レスポンスは読めないがGASは処理する）
    // 代わりにパラメータをGETでJSONPとして送る
    const params = encodeURIComponent(JSON.stringify({
      action:        'createForm',
      mapping:       mappingResult,
      sheetPosition: finalPos,
    }));

    await new Promise((resolve, reject) => {
      jsonp(GAS_URL + '?action=createForm&params=' + params, function(err, data) {
        if (err) return reject(new Error('通信エラー'));
        if (!data.ok) return reject(new Error(data.error || '処理に失敗しました'));
        resolve(data);
      });
    });

    document.getElementById('done-sub').textContent =
      adminData.year + '年' + adminData.month + '月のフォームを作成しました。';
    show('screen-done');

  } catch (err) {
    document.getElementById('btn-exec').disabled   = false;
    document.getElementById('btn-cancel').disabled = false;
    document.getElementById('exec-status').style.display = 'none';
    const errEl = document.getElementById('err-exec');
    errEl.textContent = '⚠️ ' + err.message;
    errEl.classList.add('show');
  }
}

// ============================================================
// ユーティリティ
// ============================================================
function groupSlots(slots) {
  const grouped = [], seen = {};
  slots.forEach(s => {
    const key = s.week + '_' + s.dateLabel;
    if (!seen[key]) { seen[key] = { week: s.week, dateLabel: s.dateLabel, times: [] }; grouped.push(seen[key]); }
    seen[key].times.push(s.time);
  });
  return grouped;
}
</script>
</body>
</html>
