<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./logo.png" type="image/png">
<link rel="apple-touch-icon" href="./logo.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="宇多津会衆PWアプリ">
<title>宇多津会衆PWアプリ</title>
<script src="https://accounts.google.com/gsi/client" async defer onload="initGoogleLogin()"></script>
<style>
:root {
  --green:       #16a34a;
  --green-light: #d1fae5;
  --green-mid:   #bbf7d0;
  --green-dark:  #14532d;
  --bg:          #d1fae5;
  --card:        #ffffff;
  --border:      #a7f3d0;
  --text:        #1e293b;
  --sub:         #374151;
  --danger:      #ef4444;
  --danger-dark: #dc2626;
  --amber:       #fde68a;
  --amber-dark:  #f59e0b;
  --purple:      #a5b4fc;
  --purple-dark: #6366f1;
  --radius:      14px;
  --shadow:      0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:   0 4px 24px rgba(0,0,0,0.12);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Sans JP", sans-serif;
  font-size: 17px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 32px;
}

/* ヘッダー */
.hdr {
  background: var(--green);
  color: #fff;
  padding: 0 16px;
  height: 52px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(22,163,74,0.3);
}
.hdr-left  { display: flex; align-items: center; justify-content: flex-start; }
.hdr h1    { font-size: 17px; font-weight: 700; text-align: center; }
.hdr-right { display: flex; align-items: center; justify-content: flex-end; }

/* バー右アイコン */
.hdr-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,0.7);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.2);
  transition: border-color .15s;
  flex-shrink: 0;
}
.hdr-avatar:active { border-color: #fff; }
.hdr-avatar img { width: 100%; height: 100%; object-fit: cover; }
.hdr-avatar-fallback { font-size: 18px; color: #fff; }

/* プロフィールポップアップ */
#profile-popup {
  display: none;
  position: fixed;
  top: 58px; right: 10px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  width: 240px;
  z-index: 200;
  overflow: hidden;
}
#profile-popup.show { display: block; }
.pp-header {
  background: var(--green);
  padding: 16px 14px 12px;
  display: flex; align-items: center; gap: 12px;
}
.pp-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.8);
  overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.2);
}
.pp-avatar img { width: 100%; height: 100%; object-fit: cover; }
.pp-name  { font-size: 15px; font-weight: 700; color: #fff; }
.pp-email { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; word-break: break-all; }
.pp-roles { padding: 12px 14px; border-bottom: 1px solid var(--green-light); display: flex; flex-wrap: wrap; gap: 6px; }
.pp-logout {
  display: block; width: 100%; padding: 14px;
  background: none; border: none; cursor: pointer;
  font-size: 15px; font-weight: 700; color: var(--danger);
  text-align: center; font-family: inherit;
}
.pp-logout:active { background: #fee2e2; }
#profile-overlay {
  display: none; position: fixed; inset: 0; z-index: 199;
}
#profile-overlay.show { display: block; }

/* カード */
.container { padding: 10px 10px 0; }
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 12px;
  margin-bottom: 10px;
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--green-light);
  display: flex;
  align-items: center;
  gap: 7px;
}

/* ===================== ログイン画面 ===================== */
#screen-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--bg);
}
.login-card {
  background: #fff;
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  padding: 40px 28px;
  width: 100%;
  max-width: 340px;
  text-align: center;
}
.login-logo {
  width: 64px;
  height: 64px;
  background: var(--green);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 30px;
}
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.login-sub   { font-size: 14px; color: var(--sub); margin-bottom: 28px; line-height: 1.7; }
.g-signin-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 14px 20px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
}
.g-signin-btn:hover { background: #15803d; }
.login-err {
  display: none;
  background: #fee2e2;
  color: var(--danger);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px;
  margin-top: 16px;
  text-align: left;
  line-height: 1.6;
}
.login-err.show { display: block; }
#loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  z-index: 999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  font-size: 16px;
  color: var(--sub);
}
#loading-overlay.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 4px solid var(--green-light);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===================== 初回登録画面 ===================== */
#screen-register {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--bg);
}
.register-card {
  background: #fff;
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  padding: 32px 24px;
  width: 100%;
  max-width: 360px;
  margin: 20px auto;
}
.register-title { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
.register-sub   { font-size: 14px; color: var(--sub); margin-bottom: 20px; line-height: 1.7; }
.select-wrap {
  position: relative;
  margin-bottom: 16px;
}
.select-wrap select {
  width: 100%;
  font-size: 18px;
  padding: 12px 10px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: #fff;
  appearance: none;
  font-family: inherit;
  color: var(--text);
}
.select-wrap select:focus { outline: none; border-color: var(--green); }
.btn-primary {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 700;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  letter-spacing: .04em;
  transition: opacity .2s;
}
.btn-primary:active  { opacity: .8; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }

/* ===================== メイン画面 ===================== */
#screen-main { display: none; }

/* 受付状況カード */
.status-card { border-left: 4px solid var(--green); }
.status-label { font-size: 13px; color: var(--sub); margin-bottom: 4px; }
.status-value { font-size: 18px; font-weight: 700; }
.status-open   { color: var(--green); }
.status-prep   { color: #6b7280; }
.status-closed { color: var(--danger); }
.deadline-red  { color: var(--danger); font-weight: 700; }

/* 次のシフト */
.next-shift-card {
  background: linear-gradient(135deg, var(--green) 0%, #15803d 100%);
  color: #fff;
  border-radius: var(--radius);
  padding: 16px 14px;
  margin-bottom: 10px;
}
.next-shift-label { font-size: 13px; opacity: .85; margin-bottom: 6px; }
.next-shift-date  { font-size: 22px; font-weight: 700; }
.next-shift-role  { font-size: 14px; opacity: .9; margin-top: 4px; }

/* カレンダー月ナビ */
.cal-month-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.cal-month-label { font-size: 14px; font-weight: 700; color: var(--green); }
.cal-nav-btn {
  background: var(--green-light); border: none; border-radius: 6px;
  padding: 4px 10px; font-size: 14px; cursor: pointer; color: var(--green-dark);
  font-weight: 700;
}
.cal-nav-btn:active { background: var(--green-mid); }

/* カレンダー */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-top: 8px;
}
.cal-dow {
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 0;
  color: var(--sub);
}
.cal-dow.sat { color: #2563eb; }
.cal-dow.sun { color: var(--danger); }
.cal-day {
  position: relative;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  padding: 8px 2px;
  border-radius: 8px;
  min-height: 46px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: default;
}
.cal-day.other     { color: #d1d5db; }
.cal-day.sat       { color: #2563eb; background: #eff6ff; }
.cal-day.sun       { color: var(--danger); background: #fff1f2; }
.cal-day.apply-day { background: #d1fae5; color: var(--green-dark); }
.cal-day.deadline  { background: #fee2e2; color: var(--danger-dark); }
.cal-day.open-day  { background: #eff6ff; color: #1d4ed8; }
.cal-day.shift-day { background: #ede9fe; color: #6d28d9; font-weight: 700; cursor: pointer; }
.cal-day.shift-day:active { background: #ddd6fe; }
.cal-day.shift-day.selected { background: #7c3aed; color: #fff; }
.cal-day.shift-day.selected .today-circle { background: #fff; color: #7c3aed; }
/* today: 日付数字をspan.today-circleで囲んで真円表示 */
.today-circle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #3b82f6;
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  flex-shrink: 0;
}
.cal-badge {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #7c3aed;
}
.cal-badge.my-shift { background: #f59e0b; }
.cal-sub { font-size: 10px; opacity: .8; margin-top: 1px; }
.cal-count { font-size: 10px; margin-top: 2px; opacity: .85; }

/* 申込期間バー（オレンジ） */
.cal-period-bar {
  position: absolute;
  bottom: 4px;
  left: 0;
  right: 0;
  height: 4px;
  border-radius: 2px;
}
.cal-period-bar.apply-bar  { background: #f97316; }
.cal-period-bar.apply-bar.bar-start { left: 50%; }
.cal-period-bar.apply-bar.bar-end   { right: 50%; }
.cal-period-bar.apply-bar.bar-mid   { border-radius: 0; }

/* 実施日時間帯ボックス */
#shift-time-box {
  display: none;
  margin-top: 10px;
  background: #f5f3ff;
  border: 1.5px solid #c4b5fd;
  border-radius: 10px;
  padding: 12px 14px;
}
#shift-time-box.show { display: block; }
.shift-time-box-date {
  font-size: 14px; font-weight: 700; color: #6d28d9; margin-bottom: 8px;
}
.shift-time-item {
  font-size: 14px; color: #4c1d95;
  padding: 5px 0;
  border-bottom: 1px solid #ddd6fe;
  display: flex; align-items: center; gap: 6px;
}
.shift-time-item:last-child { border-bottom: none; }

/* お知らせ */
.notice-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--green-light);
}
.notice-item:last-child { border-bottom: none; }
.notice-date  { font-size: 12px; color: var(--sub); margin-bottom: 3px; }
.notice-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.notice-body  { font-size: 14px; color: var(--sub); line-height: 1.7; white-space: pre-wrap; }

/* ロールバッジ */
.role-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.badge {
  font-size: 13px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
}
.badge-resp  { background: #fca5a5; color: #7f1d1d; }
.badge-cart  { background: #a5b4fc; color: #312e81; }
.badge-staff { background: var(--green-light); color: var(--green-dark); }

/* ナビボタン */
.nav-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.btn-nav {
  width: 100%;
  padding: 18px 16px;
  font-size: 17px;
  font-weight: 700;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn-nav:active   { background: #15803d; transform: scale(.98); }
.btn-nav .nav-icon { font-size: 22px; }
.btn-nav .nav-txt  { flex: 1; }
.btn-nav .nav-arr  { opacity: .6; }
.btn-nav.secondary { background: #f0fdf4; color: var(--green); border: 2px solid var(--green-mid); }
.btn-nav.secondary:active { background: var(--green-light); }

/* PWAインストール */
#btn-install { display: none; }

/* ===================== フォーム画面 ===================== */
#screen-form { display: none; }
.back-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 12px 0;
  cursor: pointer;
  color: var(--green);
  font-weight: 700;
  font-size: 16px;
}
.proxy-sel {
  background: #f0fdf4;
  border: 2px solid var(--green-mid);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.proxy-sel label { font-size: 14px; color: var(--sub); display: block; margin-bottom: 6px; font-weight: 700; }
.proxy-sel select {
  width: 100%;
  font-size: 16px;
  padding: 8px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: #fff;
  appearance: none;
  font-family: inherit;
}

/* スロット */
.date-group { margin-bottom: 14px; }
.date-label {
  font-size: 18px;
  font-weight: 700;
  color: var(--green-dark);
  margin-bottom: 8px;
  padding: 8px 10px;
  background: var(--green-light);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-align: center;
}
.week-badge {
  font-size: 11px;
  background: var(--green);
  color: #fff;
  padding: 2px 7px;
  border-radius: 20px;
}
.slot-row {
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .15s;
}
.slot-row.checked { border-color: var(--green); }
.slot-main {
  display: flex;
  align-items: center;
  padding: 12px 10px;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.slot-checkbox {
  width: 30px;
  height: 30px;
  min-width: 30px;
  border: 2.5px solid #d1d5db;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  transition: all .15s;
}
.slot-row.checked .slot-checkbox { background: var(--green); border-color: var(--green); }
.slot-checkbox::after {
  content: '';
  display: none;
  width: 10px;
  height: 6px;
  border-left: 2.5px solid #fff;
  border-bottom: 2.5px solid #fff;
  transform: rotate(-45deg) translate(1px,-1px);
}
.slot-row.checked .slot-checkbox::after { display: block; }
.slot-time { font-size: 18px; font-weight: 600; flex: 1; }
.last-badge {
  font-size: 11px;
  background: #fef3c7;
  color: #92400e;
  border: 1px solid var(--amber);
  border-radius: 20px;
  padding: 2px 8px;
  white-space: nowrap;
}
.slot-extra {
  display: none;
  padding: 0 10px 12px;
  border-top: 1px solid #f3f4f6;
  background: #fafafa;
  flex-direction: column;
  gap: 10px;
}
.slot-row.checked .slot-extra { display: flex; }
.cart-row {
  display: none;
  align-items: center;
  gap: 10px;
  padding-top: 10px;
  cursor: pointer;
  user-select: none;
}
.cart-row.visible { display: flex; }
.cart-check {
  width: 26px;
  height: 26px;
  min-width: 26px;
  border: 2px solid var(--danger);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  transition: all .15s;
}
.cart-check.on { background: var(--danger); }
.cart-check.on::after {
  content: '';
  display: block;
  width: 8px;
  height: 5px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translate(1px,-1px);
}
.cart-label { font-size: 15px; color: var(--danger); font-weight: 600; }
.note-area { padding-top: 6px; }
.note-area label { font-size: 13px; color: var(--sub); display: block; margin-bottom: 4px; }
.note-area textarea {
  width: 100%;
  font-size: 15px;
  padding: 8px;
  border: 1.5px solid #e5e7eb;
  border-radius: 8px;
  resize: vertical;
  min-height: 56px;
  font-family: inherit;
}
.note-area textarea:focus { outline: none; border-color: var(--green); }
.empty-note { text-align: center; color: var(--sub); font-size: 15px; padding: 20px 0; }
#last-month-card {
  background: #fffbeb;
  border: 2px solid var(--amber);
}
.toggle-wrap  { cursor: pointer; flex-shrink: 0; }
.toggle-track {
  width: 56px;
  height: 30px;
  background: #d1d5db;
  border-radius: 15px;
  position: relative;
  transition: background .2s;
}
.toggle-track.on { background: var(--amber-dark); }
.toggle-thumb {
  width: 24px;
  height: 24px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 3px;
  left: 3px;
  transition: left .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle-track.on .toggle-thumb { left: 29px; }
.msg { padding: 14px; border-radius: 10px; font-size: 15px; text-align: center; display: none; }
.msg.success { background: #dcfce7; color: var(--green); display: block; }
.msg.error   { background: #fee2e2; color: var(--danger); display: block; }

/* ===================== シフト表画面 ===================== */
#screen-shift { display: none; }
.shift-dates { display: flex; flex-direction: column; gap: 8px; }
.shift-date-btn {
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 14px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  -webkit-tap-highlight-color: transparent;
}
.shift-date-btn:active { background: var(--green-light); border-color: var(--green); }
.shift-date-btn.cancelled { border-color: var(--danger); background: #fff1f2; }
.sdb-date  { font-size: 18px; font-weight: 700; flex: 1; }
.sdb-time  { font-size: 13px; color: var(--sub); }
.sdb-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--amber);
  color: #78350f;
}
.sdb-badge.cancelled { background: var(--danger); color: #fff; }

/* シフト表詳細 */
.shift-detail { display: none; }
.shift-block {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 12px;
  margin-bottom: 10px;
}
.shift-block-hdr {
  font-size: 15px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--green-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cancel-banner {
  background: var(--danger-dark);
  color: #fff;
  text-align: center;

<script>
// ===== 定数 =====
const GAS_URL    = "https://script.google.com/macros/s/AKfycbzbPBxl6S3VdSVF9RqXSI1VQkZNGJXwU_zePBM8e3UYed-RyxxA_PRom_Xw9v5rvUwScQ/exec";
const CLIENT_ID  = "538467678510-7ltuvmuj0d1mmgngtj980me3daenqmm7.apps.googleusercontent.com";
const SS_KEY     = "shiftapp_session";

// ===== JSONP通信ユーティリティ（CORSを回避）=====
// actionはGASのdoGetで受け付けるアクション名
// paramsはオブジェクト（GASのparams()で受け取る）
// extraQueryはURLに直接付加するオブジェクト（email等）
// fetch方式（リダイレクト追従対応・Android Chrome対応）
function gasJsonp(action, params, extraQuery) {
  const cbName = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  let url = GAS_URL + '?action=' + encodeURIComponent(action) + '&callback=' + cbName;
  if (params) url += '&params=' + encodeURIComponent(JSON.stringify(params));
  if (extraQuery) {
    Object.entries(extraQuery).forEach(([k, v]) => {
      url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(v);
    });
  }
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 60000);
  return fetch(url, { redirect: 'follow', signal: controller.signal })
    .then(r => r.text())
    .then(text => {
      clearTimeout(timer);
      // "cbName({...})" 形式からJSONを取り出す
      const start = text.indexOf('(');
      const end   = text.lastIndexOf(')');
      if (start === -1 || end === -1) throw new Error('レスポンス形式エラー');
      return JSON.parse(text.slice(start + 1, end));
    })
    .catch(err => {
      clearTimeout(timer);
      if (err.name === 'AbortError') throw new Error('通信タイムアウト');
      throw new Error('通信エラー（GASへの接続に失敗）');
    });
}

// ===== グローバル状態 =====
let SESSION      = null; // { uid, name, email, token, isAdmin, isResponsible, isCart, proxyTargets }
let APP_DATA     = null; // GASから取得したデータ
let SHIFT_DATA   = null; // シフト表データ
let SHIFT_DATES  = [];   // 実施日一覧（カレンダーB10以降、'm/d'形式）
let SHIFT_DATES_MAP = {}; // 実施日→時間帯リスト { 'm_d': ['10:00〜12:00', ...] }
let SLOTS        = [], LAST_MONTH = {}, THIS_MONTH = {};
let YEAR = 0, MONTH = 0;
let currentFormName = '';
let isCartUser = false;
let lastMonthOn = false;
const formState = { checkedMap: {}, cartNgMap: {}, noteMap: {} };
let deferredPrompt = null;
let shiftViewingDate = null; // 現在表示中のシフト日付

// ===== PWA =====
window.addEventListener('beforeinstallprompt', e => {
  deferredPrompt = e;
  const b = document.getElementById('btn-install');
  if (b) b.style.display = 'flex';
});
function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
}


// ===== ローディング =====
function showLoading(msg) {
  const el = document.getElementById('loading-overlay');
  document.getElementById('loading-text').textContent = msg || '読み込み中...';
  el.classList.add('show');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}

// ===== 画面切替 =====
const SCREENS = ['login','register','main','form','shift','request'];
// 画面ごとの display 値
const SCREEN_DISPLAY = {
  login:    'flex',
  register: 'flex',
  main:     'block',
  form:     'block',
  shift:    'block',
  request:  'block'
};
function showScreen(name) {
  SCREENS.forEach(s => {
    const el = document.getElementById('screen-' + s);
    el.style.display = (s === name) ? (SCREEN_DISPLAY[s] || 'block') : 'none';
  });
  if (name === 'form')  initFormScreen();
  if (name === 'shift') initShiftScreen();
}

// ===== sessionStorage =====
function saveSession(s) {
  try { localStorage.setItem(SS_KEY, JSON.stringify(s)); } catch (_) {}
}
function loadSession() {
  try { return JSON.parse(localStorage.getItem(SS_KEY) || 'null'); } catch (_) { return null; }
}
function clearSession() {
  try { localStorage.removeItem(SS_KEY); } catch (_) {}
}

// ===== Google Identity Services 初期化 =====
// GISライブラリ読み込み後に自動で呼ばれるコールバック
function initGoogleLogin() {
  try {
    google.accounts.id.initialize({
      client_id: CLIENT_ID,
      callback: onGoogleCredential,
      auto_select: false,
      cancel_on_tap_outside: false,
      ux_mode: 'popup',        // リダイレクトではなくポップアップ
    });
    const btnDiv = document.getElementById('g-btn-container');
    if (btnDiv) {
      google.accounts.id.renderButton(btnDiv, {
        type: 'standard',
        theme: 'filled_green',
        size: 'large',
        width: 280,
        text: 'signin_with',
        locale: 'ja',
      });
    }
    // One Tapも試みる（サポートされている環境のみ）
    google.accounts.id.prompt();
  } catch (e) {
    // GISが未ロードなら何もしない（ボタンはHTMLに既にある）
    console.warn('GIS init error:', e);
  }
}

async function onGoogleCredential(response) {
  showLoading('認証中...');
  try {
    const parts   = response.credential.split('.');
    const payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
    const email   = payload.email   || '';
    const name    = payload.name    || '';
    const picture = payload.picture || '';
    await handleGASAuth(email, response.credential, name, picture);
  } catch (e) {
    hideLoading();
    showLoginError('ユーザー情報の取得に失敗しました。ページを再読み込みしてください。');
  }
}

async function handleGASAuth(email, token, displayName, picture) {
  showLoading('認証中...');
  try {
    const data = await gasJsonp('auth', null, { source: 'form', email });
    hideLoading();

    if (!data.ok) {
      if (data.reason === 'unauthorized') {
        showLoginError('このアカウントはアクセス許可されていません。\n管理者にお問い合わせください。');
      } else {
        showLoginError('認証エラーが発生しました: ' + (data.reason || ''));
      }
      return;
    }

    if (data.needsRegister) {
      saveSession({ email, token, needsRegister: true, members: data.members, picture: picture || '' });
      buildRegisterScreen(data.members, email, token, displayName, picture || '');
      return;
    }

    // ログイン成功
    SESSION = {
      uid: data.uid, name: data.name, email: email, token: token,
      isAdmin: data.isAdmin, isResponsible: data.isResponsible,
      isCart: data.isCart, proxyTargets: data.proxyTargets || [],
      picture: picture || ''
    };
    saveSession(SESSION);
    await initApp();
  } catch (e) {
    hideLoading();
    showLoginError('通信エラーが発生しました。ページを再読み込みしてください。');
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-err');
  el.textContent = msg;
  el.classList.add('show');
  showScreen('login');
}

// ===== 初回登録 =====
function buildRegisterScreen(members, email, token, displayName, picture) {
  const sel = document.getElementById('sel-register-name');
  sel.innerHTML = '<option value="">-- 選択してください --</option>';
  members.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.name;
    opt.textContent = m.name;
    sel.appendChild(opt);
  });
  // メタ情報を一時保存
  sel.dataset.email   = email;
  sel.dataset.token   = token;
  sel.dataset.picture = picture || '';
  showScreen('register');
}

async function doRegister() {
  const sel   = document.getElementById('sel-register-name');
  const name  = sel.value;
  const email = sel.dataset.email;
  if (!name) { alert('名前を選択してください。'); return; }
  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = '登録中...';
  try {
    const data = await gasJsonp('register', { email, name });
    if (!data.ok) throw new Error(data.error || '登録に失敗しました');
    SESSION = {
      uid: data.uid, name: data.name, email: email, token: sel.dataset.token,
      isAdmin: data.isAdmin, isResponsible: data.isResponsible,
      isCart: data.isCart, proxyTargets: data.proxyTargets || [],
      picture: sel.dataset.picture || ''
    };
    saveSession(SESSION);
    await initApp();
  } catch (e) {
    const msg = document.getElementById('register-msg');
    msg.className = 'msg error';
    msg.textContent = '⚠️ ' + e.message;
    btn.disabled = false; btn.textContent = '登録する';
  }
}

// ===== プロフィールポップアップ =====
function updateAvatarUI() {
  if (!SESSION) return;
  const pic = SESSION.picture || '';
  // すべての画面のアバターを更新
  ['hdr-avatar', 'pp-avatar'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (pic) {
      el.innerHTML = '<img src="' + esc(pic) + '" alt="' + esc(SESSION.name) + '">';
    }
  });
  // ポップアップ内情報
  const ppName  = document.getElementById('pp-name');
  const ppEmail = document.getElementById('pp-email');
  const ppRoles = document.getElementById('pp-roles');
  if (ppName)  ppName.textContent  = SESSION.name;
  if (ppEmail) ppEmail.textContent = SESSION.email;
  if (ppRoles) {
    ppRoles.innerHTML = '';
    if (SESSION.isAdmin && !SESSION.uid) {
      // 管理アカウント（uidなし）：オーナーのみ
      ppRoles.innerHTML = '<span class="badge" style="background:#fef9c3;color:#713f12;">オーナー</span>';
    } else {
      // メンバー全員：奉仕者を必ず最初に表示、その後役割バッジを追加
      ppRoles.innerHTML += '<span class="badge badge-staff">奉仕者</span>';
      if (SESSION.isResponsible) ppRoles.innerHTML += '<span class="badge badge-resp">責任者</span>';

      if (SESSION.isAdmin)       ppRoles.innerHTML += '<span class="badge" style="background:#fef9c3;color:#713f12;">管理者</span>';
    }
  }

// ===== アプリ初期化 =====
async function initApp() {
  showLoading('データを読み込み中...');
  try {
    const [formData, shiftData] = await Promise.all([
      gasJsonp('data'),
      gasJsonp('getShiftTable')
    ]);
    APP_DATA    = formData;
    SHIFT_DATA  = shiftData;
    SLOTS       = formData.slots || [];
    LAST_MONTH  = formData.lastMonthData || {};
    THIS_MONTH  = formData.thisMonthData || {};
    YEAR        = formData.year  || 0;
    MONTH       = formData.month || 0;
    SHIFT_DATES = formData.shiftDates || []; // 実施日一覧（'m/d'形式）

    // 実施日→時間帯マップを構築（GASのshiftSlotsを使用）
    SHIFT_DATES_MAP = {};
    (formData.shiftSlots || []).forEach(s => {
      const key = s.m + '_' + s.d;
      if (!SHIFT_DATES_MAP[key]) SHIFT_DATES_MAP[key] = [];
      if (!SHIFT_DATES_MAP[key].includes(s.time)) SHIFT_DATES_MAP[key].push(s.time);
    });
    hideLoading();
    try {
      buildMainScreen();
    } catch (buildErr) {
      console.error('buildMainScreen error:', buildErr);
      alert('画面の構築に失敗しました: ' + buildErr.message);
      return;
    }
    showScreen('main');
  } catch (e) {
    hideLoading();
    console.error('initApp error:', e);
    alert('データの読み込みに失敗しました: ' + e.message);
  }
}

function buildMainScreen() {
  // バー年月表示

  document.getElementById('main-title').textContent = yearMonthLabel;
  document.getElementById('form-title') && (document.getElementById('form-title').textContent = yearMonthLabel);
  document.title = '宇多津会衆PWアプリ';

  // バー右アイコン更新
  updateAvatarUI();

  const isOwner = SESSION.isAdmin && !SESSION.uid;
  const ed      = APP_DATA.eventDates || {};
  const status  = APP_DATA.status || '準備中';
  const today   = new Date(); today.setHours(0,0,0,0);

  // 今日が締切日か判定
  const parseEventDate = str => {
    if (!str) return null;
    const p = str.split('/');
    if (p.length !== 2) return null;
    // 年をYEARから取得（シフト当月の年）
    const y = YEAR || today.getFullYear();
    return new Date(y, parseInt(p[0]) - 1, parseInt(p[1]));
  };
  const deadlineD      = parseEventDate(ed['締切']);
  const isDeadlineToday = deadlineD && deadlineD.getTime() === today.getTime();
  const openD          = parseEventDate(ed['シフト公開']);
  const isOpenDateSet  = !!openD;
  const isOpenPassed   = openD && openD.getTime() <= today.getTime();

  // ── シフト希望ボタン：受付中のみ有効、それ以外はグレーアウト、管理者は非表示 ──
  const btnForm = document.getElementById('btn-shift-form');
  if (btnForm) {
    if (isOwner) {
      btnForm.style.display = 'none';
    } else if (status === '受付中') {
      btnForm.disabled = false;
      btnForm.style.opacity = '';
      btnForm.style.cursor  = '';
      btnForm.onclick = () => showScreen('form');
      btnForm.style.display = '';
    } else {
      // 準備中・受付終了はグレーアウト
      btnForm.disabled = true;
      btnForm.style.opacity = '0.5';
      btnForm.style.cursor  = 'default';
      btnForm.onclick = null;
      btnForm.style.display = '';
    }

  // ── シフト表ボタン：公開予定日以降のみ有効、未設定はグレーアウト＋文言変更 ──
  const btnShiftView    = document.getElementById('btn-shift-view');
  const btnShiftViewTxt = document.getElementById('btn-shift-view-txt');

      btnShiftView.style.cursor  = 'default';
      btnShiftView.onclick = null;
      btnShiftViewTxt.textContent = '現在公開予定日は未定です。区域係に問い合わせてください';

    } else if (!isOpenPassed) {

      btnShiftView.style.opacity = '0.5';
      btnShiftView.style.cursor  = 'default';
      btnShiftView.onclick = null;
      btnShiftViewTxt.textContent = 'シフト表を見る（公開予定日: ' + ed['シフト公開'] + '）';
      btnShiftViewTxt.style.fontSize = '';
    } else {

      btnShiftView.disabled = false;
      btnShiftView.style.opacity = '';
      btnShiftView.style.cursor  = '';
      btnShiftView.onclick = () => showScreen('shift');
      btnShiftViewTxt.textContent = 'シフト表を見る';
      btnShiftViewTxt.style.fontSize = '';
    }

  // ── 要望ボタン：管理者は非表示 ──

  calDisplayYear  = todayForCal.getFullYear();
  calDisplayMonth = todayForCal.getMonth() + 1;

// カレンダー表示中の年月（実際の今月 or 先月）
let calDisplayYear  = 0;
let calDisplayMonth = 0;

function calNavMonth(delta) {
  let newY = calDisplayYear;
  let newM = calDisplayMonth + delta;
  if (newM < 1)  { newM = 12; newY--; }
  if (newM > 12) { newM = 1;  newY++; }

  // 移動可能範囲：今日の月の1ヶ月前〜シフト当月（どちらか遅い方まで）
  const shiftY = YEAR  || new Date().getFullYear();
  const shiftM = MONTH || new Date().getMonth() + 1;
  const realToday = new Date();
  const realY = realToday.getFullYear();
  const realM = realToday.getMonth() + 1;

  // 下限：realM の1ヶ月前
  let minY = realY, minM = realM - 1;
  if (minM < 1) { minM = 12; minY--; }
  // 上限：shiftM と realM のどちらか遅い方
  const shiftVal = shiftY * 100 + shiftM;
  const realVal  = realY  * 100 + realM;
  let maxVal = Math.max(shiftVal, realVal);
  const maxY = Math.floor(maxVal / 100);
  const maxM = maxVal % 100;

  const targetVal = newY * 100 + newM;
  const minVal    = minY * 100 + minM;
  if (targetVal < minVal || targetVal > maxVal) return;

  calDisplayYear  = newY;
  calDisplayMonth = newM;
  // 月移動時に時間帯ボックスを閉じる
  _selectedShiftKey = null;
  const box = document.getElementById('shift-time-box');
  if (box) box.classList.remove('show');
  buildCalendar();
}

function buildCalendar() {
  const ed     = APP_DATA.eventDates || {};
  const grid   = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const dispY = calDisplayYear;
  const dispM = calDisplayMonth;
  document.getElementById('cal-title').textContent = dispY + '年' + dispM + '月';

  // 実際の今日（ハイライト用）
  const today = new Date(); today.setHours(0,0,0,0);

  // ナビボタンの活性制御（今日の月を基準に前後1ヶ月）
  const shiftY = YEAR  || new Date().getFullYear();
  const shiftM = MONTH || new Date().getMonth() + 1;
  const realToday2 = new Date();
  const realY2 = realToday2.getFullYear();
  const realM2 = realToday2.getMonth() + 1;
  let minY2 = realY2, minM2 = realM2 - 1;
  if (minM2 < 1) { minM2 = 12; minY2--; }
  const maxVal2 = Math.max(shiftY * 100 + shiftM, realY2 * 100 + realM2);
  const minVal2 = minY2 * 100 + minM2;
  const curVal2 = dispY * 100 + dispM;
  const prevBtn = document.querySelector('.cal-nav-btn:first-child');
  const nextBtn = document.querySelector('.cal-nav-btn:last-child');
  if (prevBtn) prevBtn.style.opacity = curVal2 <= minVal2 ? '0.4' : '1';
  if (nextBtn) nextBtn.style.opacity = curVal2 >= maxVal2 ? '0.4' : '1';

  const DOWS = ['月','火','水','木','金','土','日'];
  DOWS.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i === 5 ? ' sat' : i === 6 ? ' sun' : '');
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(dispY, dispM - 1, 1);
  const dow      = firstDay.getDay();
  const offset   = dow === 0 ? 6 : dow - 1;
  const lastDate = new Date(dispY, dispM, 0).getDate();

  // イベント日付セット（表示中の年を基準）
  const parseDate = str => {
    if (!str) return null;
    const p = str.split('/');
    return p.length === 2 ? new Date(dispY, parseInt(p[0]) - 1, parseInt(p[1])) : null;
  };
  const applyD    = parseDate(ed['申込開始']);
  const deadlineD = parseDate(ed['締切']);
  const openD     = parseDate(ed['シフト公開']);

  // 実施日セット：SHIFT_DATES（カレンダーB10以降）を優先使用
  // SHIFT_DATESは'm/d'形式、表示月でフィルタして'm_d'キーのSetを作成
  const shiftDays = new Set();
  (SHIFT_DATES.length > 0 ? SHIFT_DATES : []).forEach(dateStr => {
    const p = dateStr.split('/');
    if (p.length === 2) {
      const m = parseInt(p[0]), day = parseInt(p[1]);
      if (m === dispM) shiftDays.add(m + '_' + day);
    }
  });
  // SHIFT_DATESが空の場合はSHIFT_DATA.datesからフォールバック
  if (shiftDays.size === 0) {
    (SHIFT_DATA && SHIFT_DATA.dates || []).forEach(d => {
      const p = d.date.split('/');
      if (p.length === 2) {
        const m = parseInt(p[0]), day = parseInt(p[1]);
        if (m === dispM) shiftDays.add(m + '_' + day);
      }
    });
  }
  console.log('[Calendar] dispM=' + dispM + ' SHIFT_DATES=', SHIFT_DATES, ' shiftDays=', [...shiftDays]);

  // 自分のシフト日セット（SHIFT_DATA.datesから、公開後のみ有効）
  const myShiftDays = new Set();
  (SHIFT_DATA && SHIFT_DATA.dates || []).forEach(d => {
    if (isMyCellInDate(d)) {
      const p = d.date.split('/');
      if (p.length === 2) {
        const m = parseInt(p[0]), day = parseInt(p[1]);
        if (m === dispM) myShiftDays.add(m + '_' + day);
      }
    }
  });

  // 申込期間バー用：申込開始〜締切の範囲を計算
  const applyStart = applyD ? applyD.getTime() : null;
  const applyEnd   = deadlineD ? deadlineD.getTime() : null;

  const total = Math.ceil((offset + lastDate) / 7) * 7;
  for (let i = 0; i < total; i++) {
    const day = i - offset + 1;
    const el  = document.createElement('div');
    el.className = 'cal-day';
    if (day < 1 || day > lastDate) {
      el.classList.add('other');
      el.textContent = '';
    } else {
      const thisDate = new Date(dispY, dispM - 1, day);
      const thisT    = thisDate.getTime();
      const col = i % 7;
      if (col === 5) el.classList.add('sat');
      if (col === 6) el.classList.add('sun');

      const isToday    = thisT === today.getTime();
      const isApply    = applyD    && isSameDayJS(thisDate, applyD);
      const isDeadline = deadlineD && isSameDayJS(thisDate, deadlineD);
      const isOpen     = openD     && isSameDayJS(thisDate, openD);
      if (isApply)    el.classList.add('apply-day');
      if (isDeadline) el.classList.add('deadline');
      if (isOpen)     el.classList.add('open-day');

      // 日付表示：今日は真円span、それ以外はテキスト
      const dayLabel = document.createElement('span');
      if (isToday) {
        dayLabel.className = 'today-circle';
      }
      dayLabel.textContent = day;

      // 実施日かどうか（サブラベルより先に判定）
      const key      = dispM + '_' + day;
      const isShift  = shiftDays.has(key);

      // サブラベル：実施日優先、次に申込/締切/公開予定
      const hasSub = isShift ? null  // 実施日は件数をcal-countで別途表示
                   : isApply    ? '申込'
                   : isDeadline ? '締切'
                   : isOpen     ? '公開予定'
                   : '';
      el.appendChild(dayLabel);
      if (hasSub) {
        const sub = document.createElement('span');
        sub.className   = 'cal-sub';
        sub.textContent = hasSub;
        el.appendChild(sub);
      }

      // 申込期間バー（申込開始〜締切の期間中）
      if (applyStart && applyEnd && thisT >= applyStart && thisT <= applyEnd) {
        const bar = document.createElement('div');
        bar.className = 'cal-period-bar apply-bar';
        if (thisT === applyStart && thisT === applyEnd) {
          // 1日だけの場合（バー全幅）
        } else if (thisT === applyStart) {
          bar.classList.add('bar-start');
        } else if (thisT === applyEnd) {
          bar.classList.add('bar-end');
        } else {
          bar.classList.add('bar-mid');
        }
        el.appendChild(bar);
      }

      // 実施日：件数表示＋クリックイベント
      if (isShift) {
        el.classList.add('shift-day');

        // 件数（SHIFT_DATESから同日のスロット数を算出）
        const count = (SHIFT_DATES_MAP[key] || []).length;
        if (count > 0) {
          const countEl = document.createElement('span');
          countEl.className   = 'cal-count';
          countEl.textContent = count + '件';
          el.appendChild(countEl);
        }

        // 自分のシフトバッジ
        if (myShiftDays.has(key)) {
          const badge = document.createElement('div');
          badge.className = 'cal-badge my-shift';
          el.appendChild(badge);
        }

        // クリックで時間帯ボックスを表示/非表示
        el.addEventListener('click', () => toggleShiftTimeBox(key, dispY, dispM, day));
      }
    }
    grid.appendChild(el);
  }
}

// ===== カレンダー実施日クリック：時間帯ボックス表示 =====
let _selectedShiftKey = null;

function toggleShiftTimeBox(key, y, m, d) {
  const box      = document.getElementById('shift-time-box');
  const boxDate  = document.getElementById('shift-time-box-date');
  const boxList  = document.getElementById('shift-time-box-list');

  // 同じセルを再クリックで閉じる
  if (_selectedShiftKey === key) {
    _selectedShiftKey = null;
    box.classList.remove('show');
    // 選択状態を解除
    document.querySelectorAll('.cal-day.shift-day.selected').forEach(el => el.classList.remove('selected'));
    return;
  }

  _selectedShiftKey = key;

  // 選択状態の更新
  document.querySelectorAll('.cal-day.shift-day.selected').forEach(el => el.classList.remove('selected'));
  // クリックされたセルにselectedを付与（イベントのターゲット経由で探す）
  document.querySelectorAll('.cal-day.shift-day').forEach(el => {
    const dayEl = el.querySelector('span');
    if (dayEl && parseInt(dayEl.textContent) === d) el.classList.add('selected');
  });

  const DAY_NAMES = ['日','月','火','水','木','金','土'];
  const dt = new Date(y, m - 1, d);
  boxDate.textContent = m + '月' + d + '日（' + DAY_NAMES[dt.getDay()] + '）の時間帯';

  const times = SHIFT_DATES_MAP[key] || [];
  boxList.innerHTML = '';
  if (times.length === 0) {
    boxList.innerHTML = '<div class="shift-time-item">時間帯情報がありません</div>';
  } else {
    times.forEach(t => {
      const item = document.createElement('div');
      item.className   = 'shift-time-item';
      item.innerHTML   = '🕐 ' + esc(t);
      boxList.appendChild(item);
    });
  }
  box.classList.add('show');
}

function isMyCellInDate(dateObj) {
  if (!SESSION) return false;
  const name = SESSION.name;
  return (dateObj.slots || []).some(slot =>
    [...slot.north, ...slot.south].some(p => p && p.name === name)
  ) || (dateObj.responsible || []).includes(name)
    || (dateObj.cart && (
        (dateObj.cart.bring || []).some(c => c.name === name) ||
        (dateObj.cart.take  || []).some(c => c.name === name)
       ));
}

function isSameDayJS(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}

function buildNextShift() {
  if (!SHIFT_DATA || !SHIFT_DATA.dates || !SESSION) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const name  = SESSION.name;
  const next  = SHIFT_DATA.dates.find(d => {
    const p = d.date.split('/');
    if (p.length !== 2) return false;
    const dt = new Date(YEAR, parseInt(p[0]) - 1, parseInt(p[1]));
    if (dt < today) return false;
    if (d.cancelled) return false;
    return isMyCellInDate(d);
  });
  if (!next) return;
  const card = document.getElementById('next-shift-card');
  card.style.display = '';
  document.getElementById('next-shift-date').textContent = next.date + '（' + next.weekday + '） ' + next.time;
  // 役割判定
  let role = '奉仕者';
  if ((next.responsible || []).includes(name)) role = '責任者';
  else if ((next.cart && [...(next.cart.bring||[]), ...(next.cart.take||[])]).some(c => c.name === name)) role = 'カート担当';
  document.getElementById('next-shift-role').textContent = '役割: ' + role;
}

function initFormState(name) {
  formState.checkedMap = {}; formState.cartNgMap = {}; formState.noteMap = {};
  if (THIS_MONTH[name]) {
    const d = THIS_MONTH[name];
    Object.entries(d.checkedMap || {}).forEach(([k, arr]) => { formState.checkedMap[k] = new Set(arr); });
    Object.entries(d.cartNgMap  || {}).forEach(([k, arr]) => { formState.cartNgMap[k]  = new Set(arr); });
    Object.entries(d.noteMap    || {}).forEach(([k, v])   => { formState.noteMap[k] = v; });
    return;
  }
  if (LAST_MONTH[name]) {
    SLOTS.forEach(slot => {
      const sk = slot.week + ' ' + slot.dateLabel + ' ' + slot.time;
      if (LAST_MONTH[name][sk]) {
        const gk = slot.week + ' ' + slot.dateLabel;
        if (!formState.checkedMap[gk]) formState.checkedMap[gk] = new Set();
        formState.checkedMap[gk].add(slot.time);
      }
    });
  }
}

function groupSlots(slots) {
  const g = [], seen = {};
  slots.forEach(s => {
    const k = s.week + '_' + s.dateLabel;
    if (!seen[k]) { seen[k] = { week: s.week, dateLabel: s.dateLabel, times: [] }; g.push(seen[k]); }
    seen[k].times.push(s.time);
  });
  return g;
}

function renderSlots(name) {
  const container = document.getElementById('slots-container');
  const grouped   = groupSlots(SLOTS);
  if (grouped.length === 0) { container.innerHTML = '<p class="empty-note">スロットがありません</p>'; return; }
  container.innerHTML = '';
  grouped.forEach(g => {
    const groupKey = g.week + ' ' + g.dateLabel;
    const div = document.createElement('div');
    div.className = 'date-group';
    div.innerHTML = '<div class="date-label"><span class="week-badge">' + g.week + '</span>' + g.dateLabel + '</div>';
    g.times.forEach(time => {
      const slotKey       = groupKey + ' ' + time;
      const isChecked     = !!(formState.checkedMap[groupKey] && formState.checkedMap[groupKey].has(time));
      const isLast        = !!(LAST_MONTH[name] && LAST_MONTH[name][slotKey]);
      const cartNgChecked = !!(formState.cartNgMap[groupKey] && formState.cartNgMap[groupKey].has(time));
      const noteVal       = formState.noteMap[slotKey] || '';
      const row = document.createElement('div');
      row.className = 'slot-row' + (isChecked ? ' checked' : '');
      row.dataset.group = groupKey; row.dataset.time = time;
      const badge = isLast ? '<span class="last-badge">先月も参加</span>' : '';
      row.innerHTML =
        '<div class="slot-main" onclick="toggleSlot(this)">'
        + '<div class="slot-checkbox"></div>'
        + '<div class="slot-time">' + time + '</div>'
        + badge + '</div>'
        + '<div class="slot-extra">'
        + '<div class="cart-row' + (isCartUser ? ' visible' : '') + '" onclick="toggleCart(this)">'
        + '<div class="cart-check' + (cartNgChecked ? ' on' : '') + '"></div>'
        + '<span class="cart-label">この時間はカート担当不可</span></div>'
        + '<div class="note-area"><label>備考（途中参加・早退など）</label>'
        + '<textarea placeholder="例: 10:00から / 14:00まで" oninput="saveNote(this)">' + noteVal + '</textarea></div>'
        + '</div>';
      div.appendChild(row);
    });
    container.appendChild(div);
  });
}

function toggleSlot(el) {
  const row = el.closest('.slot-row'), gk = row.dataset.group, time = row.dataset.time;
  if (row.classList.contains('checked')) {
    row.classList.remove('checked');
    if (formState.checkedMap[gk]) formState.checkedMap[gk].delete(time);
    if (formState.cartNgMap[gk])  formState.cartNgMap[gk].delete(time);
    delete formState.noteMap[gk + ' ' + time];
  } else {
    row.classList.add('checked');
    if (!formState.checkedMap[gk]) formState.checkedMap[gk] = new Set();
    formState.checkedMap[gk].add(time);
  }
}
function toggleCart(el) {
  const row = el.closest('.slot-row'), gk = row.dataset.group, time = row.dataset.time;
  const ch  = el.querySelector('.cart-check');
  if (ch.classList.contains('on')) { ch.classList.remove('on'); if (formState.cartNgMap[gk]) formState.cartNgMap[gk].delete(time); }
  else { ch.classList.add('on'); if (!formState.cartNgMap[gk]) formState.cartNgMap[gk] = new Set(); formState.cartNgMap[gk].add(time); }
}
function saveNote(el) {
  const row = el.closest('.slot-row');
  formState.noteMap[row.dataset.group + ' ' + row.dataset.time] = el.value.trim();
}
function toggleLastMonth() {
  lastMonthOn = !lastMonthOn;
  const track = document.getElementById('toggle-track');
  if (lastMonthOn) {
    track.classList.add('on');
    if (LAST_MONTH[currentFormName]) {
      SLOTS.forEach(slot => {
        const sk = slot.week + ' ' + slot.dateLabel + ' ' + slot.time;
        if (LAST_MONTH[currentFormName][sk]) {
          const gk = slot.week + ' ' + slot.dateLabel;
          if (!formState.checkedMap[gk]) formState.checkedMap[gk] = new Set();
          formState.checkedMap[gk].add(slot.time);
        }
      });
    }
  } else {
    track.classList.remove('on');
    formState.checkedMap = {}; formState.cartNgMap = {}; formState.noteMap = {};
  }
  renderSlots(currentFormName);
}

async function submitForm() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = '送信中...';
  const cm = {}, ng = {};
  Object.entries(formState.checkedMap).forEach(([k, s]) => { cm[k] = [...s]; });
  Object.entries(formState.cartNgMap).forEach(([k, s])  => { ng[k] = [...s]; });
  const payload = {
    name: currentFormName,
    checkedMap: cm, cartNgMap: ng, noteMap: Object.assign({}, formState.noteMap)
  };
  try {
    const result = await gasJsonp('submitShift', payload);
    if (result && result.ok === false) throw new Error(result.error || '送信失敗');
    const msg = document.getElementById('form-msg');
    msg.className = 'msg success';
    msg.textContent = '✅ 送信が完了しました！';
    btn.textContent = '送信済み';
    setTimeout(() => showScreen('main'), 2000);
  } catch (e) {
    const msg = document.getElementById('form-msg');
    msg.className = 'msg error';
    msg.textContent = '⚠️ 通信エラーが発生しました。もう一度お試しください。';
    btn.disabled = false; btn.textContent = '送信する';
  }
}

// ===== シフト表画面 =====
function initShiftScreen() {
  document.getElementById('shift-date-list').style.display   = '';
  document.getElementById('shift-detail-view').style.display = 'none';
  document.getElementById('shift-back-btn').onclick = () => showScreen('main');
  shiftViewingDate = null;
  buildShiftDateList();
}

function buildShiftDateList() {
  const container = document.getElementById('shift-dates-container');
  container.innerHTML = '';
  if (!SHIFT_DATA || !SHIFT_DATA.published) {
    container.innerHTML = '<div class="card" style="text-align:center;color:var(--sub);padding:30px;">シフト表はまだ公開されていません</div>';
    return;
  }
  (SHIFT_DATA.dates || []).forEach(d => {
    const btn = document.createElement('div');
    btn.className = 'shift-date-btn' + (d.cancelled ? ' cancelled' : '');
    const hasMyShift = isMyCellInDate(d);
    btn.innerHTML =
      '<div class="sdb-date">' + d.date + '（' + d.weekday + '）</div>'
      + '<div class="sdb-time">' + d.time + '</div>'
      + (d.cancelled ? '<span class="sdb-badge cancelled">中止</span>'
          : hasMyShift ? '<span class="sdb-badge">参加</span>' : '');
    btn.onclick = () => showShiftDetail(d);
    container.appendChild(btn);
  });
}

function showShiftDetail(dateObj) {
  shiftViewingDate = dateObj;
  document.getElementById('shift-date-list').style.display   = 'none';
  document.getElementById('shift-detail-view').style.display = '';
  document.getElementById('shift-back-btn').onclick = () => {
    document.getElementById('shift-date-list').style.display   = '';
    document.getElementById('shift-detail-view').style.display = 'none';
    document.getElementById('shift-back-btn').onclick = () => showScreen('main');
  };
  buildShiftDetail(dateObj);
}

function buildShiftDetail(d) {
  const container = document.getElementById('shift-detail-container');
  const myName    = SESSION ? SESSION.name : '';
  let html = '';

  html += '<div class="shift-block">';
  html += '<div class="shift-block-hdr">';
  html += '<span>' + d.date + '（' + d.weekday + '） ' + d.time + '</span>';
  // 管理者・責任者向け操作ボタン
  if (SESSION && (SESSION.isAdmin || (SESSION.isResponsible && (d.responsible || []).includes(myName)))) {
    html += '<div class="edit-actions">';
    html += '<button class="btn-small btn-cancel-input" onclick="openCancelInput(' + JSON.stringify(d.date) + ',' + JSON.stringify(d.time) + ')">中止入力</button>';
    html += '<button class="btn-small btn-memo-edit" onclick="openMemoEdit(' + JSON.stringify(d.date) + ',' + JSON.stringify(d.time) + ')">メモ編集</button>';
    html += '</div>';
  }
  html += '</div>';

  // 中止バナー
  if (d.cancelled) {
    html += '<div class="cancel-banner">⛔ 中止' + (d.cancelReason ? '：' + esc(d.cancelReason) : '') + '</div>';
  }

  // メモ
  if (d.memo) {
    html += '<div class="memo-box"><label>📝 責任者メモ</label>' + esc(d.memo) + '</div>';
  }

  // 責任者
  if (d.responsible && d.responsible.length > 0) {
    html += '<div class="resp-row"><span class="resp-label">責任者：</span>';
    d.responsible.forEach(name => {
      html += '<span style="font-weight:700;">' + esc(name) + '</span>&nbsp;';
    });
    html += '</div>';
  }

  // カート担当
  if (d.cart) {
    const allCart = [...(d.cart.bring || []), ...(d.cart.take || [])].filter(c => c.name);
    if (allCart.length > 0) {
      html += '<div class="cart-info-row"><span class="cart-label-s">カート：</span>';
      (d.cart.bring || []).filter(c => c.name).forEach(c => {
        html += '<span>持込: <b>' + esc(c.name) + '</b>' + (c.cartNo ? '(' + c.cartNo + ')' : '') + '</span>&nbsp;';
      });
      (d.cart.take || []).filter(c => c.name).forEach(c => {
        html += '<span>持帰: <b>' + esc(c.name) + '</b>' + (c.cartNo ? '(' + c.cartNo + ')' : '') + '</span>&nbsp;';
      });
      html += '</div>';
    }
  }

  // 奉仕者テーブル
  if (d.slots && d.slots.length > 0) {
    // 北口
    html += '<div class="area-section"><div class="area-title">🔵 北口</div>';
    html += '<table class="slot-table"><thead><tr><th>時間</th><th>1</th><th>2</th><th>3</th></tr></thead><tbody>';
    d.slots.forEach(slot => {
      html += '<tr><td class="time-col">' + slot.time + '</td>';
      slot.north.forEach(p => {
        const cellClass = getCellClass(p, myName, d, 'north');
        html += '<td class="' + cellClass + '">' + formatName(p) + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';

    // 南口
    html += '<div class="area-section"><div class="area-title">🟠 南口</div>';
    html += '<table class="slot-table"><thead><tr><th>時間</th><th>1</th><th>2</th><th>3</th></tr></thead><tbody>';
    d.slots.forEach(slot => {
      html += '<tr><td class="time-col">' + slot.time + '</td>';
      slot.south.forEach(p => {
        const cellClass = getCellClass(p, myName, d, 'south');
        html += '<td class="' + cellClass + '">' + formatName(p) + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

function getCellClass(p, myName, d, area) {
  if (!p || !p.name || p.name !== myName) return '';
  const isResp = (d.responsible || []).includes(myName);
  const isCart = d.cart && ([...(d.cart.bring||[]),...(d.cart.take||[])]).some(c => c.name === myName);
  if (isResp && isCart) return 'my-cell-both';
  if (isResp) return 'my-cell-resp';
  if (isCart) return 'my-cell-cart';
  return 'my-cell-staff';
}
function formatName(p) {
  if (!p || !p.name) return '';
  return esc(p.name) + (p.watch ? '<span class="watch-mark">（見守り）</span>' : '');
}

// 中止入力（長押し3秒）
let cancelTimer = null;
function openCancelInput(date, time) {
  const reason = prompt('中止理由を入力してください（空白でも可）:', '');
  if (reason === null) return; // キャンセル
  showLoading('中止情報を登録中...');
  gasJsonp('cancelShift', { date, time, reason, uid: SESSION.uid }).then(data => {
    hideLoading();
    if (data.ok) { alert('中止情報を登録しました。'); initApp().then(() => showScreen('shift')); }
    else alert('エラー: ' + data.error);
  }).catch(() => { hideLoading(); alert('通信エラー'); });
}

// メモ編集
function openMemoEdit(date, time) {
  const key = date + '_' + time;
  const current = (shiftViewingDate && shiftViewingDate.memo) || '';
  const memo = prompt('責任者メモを入力してください:', current);
  if (memo === null) return;
  showLoading('メモを保存中...');
  gasJsonp('saveMemo', { date, time, memo }).then(data => {
    hideLoading();
    if (data.ok) { initApp().then(() => showScreen('shift')); }
    else alert('エラー: ' + data.error);
  }).catch(() => { hideLoading(); alert('通信エラー'); });
}

// ===== 要望送信 =====
async function submitRequest() {
  const ta  = document.getElementById('req-textarea');
  const btn = document.getElementById('btn-req-submit');
  const msg = document.getElementById('req-msg');
  if (!ta.value.trim()) { alert('内容を入力してください。'); return; }
  btn.disabled = true; btn.textContent = '送信中...';
  try {
    const data = await gasJsonp('postRequest', { uid: SESSION.uid, name: SESSION.name, body: ta.value.trim() });
    if (data.ok) {
      msg.className = 'msg success'; msg.textContent = '✅ 要望を送信しました！';
      ta.value = '';
      setTimeout(() => showScreen('main'), 2000);
    } else throw new Error(data.error);
  } catch (e) {
    msg.className = 'msg error'; msg.textContent = '⚠️ 送信に失敗しました。';
    btn.disabled = false; btn.textContent = '送信する';
  }
}



// ===== エスケープ =====
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 起動処理 =====
(async function init() {
  // セッション復元を試みる
  const saved = loadSession();
  if (saved && saved.email) {
    if (saved.needsRegister) {
      // 初回登録途中でリロードされた場合は登録画面へ
      buildRegisterScreen(saved.members || [], saved.email, saved.token || '', '', saved.picture || '');
      return;
    }
    // uid有り（一般メンバー）またはuid無し（管理者）どちらもセッション復元
    SESSION = saved;
    await initApp();
    return;
  }
  // 未ログイン
  showScreen('login');
})();
</script>
